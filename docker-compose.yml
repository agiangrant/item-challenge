services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "java -version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name ExamItems \
          --attribute-definitions \
            AttributeName=id,AttributeType=S \
            AttributeName=version,AttributeType=N \
            AttributeName=status,AttributeType=S \
            AttributeName=lastModified,AttributeType=N \
            AttributeName=subject,AttributeType=S \
          --key-schema \
            AttributeName=id,KeyType=HASH \
            AttributeName=version,KeyType=RANGE \
          --global-secondary-indexes \
            '[{
              "IndexName": "status-lastModified-index",
              "KeySchema": [
                {"AttributeName": "status", "KeyType": "HASH"},
                {"AttributeName": "lastModified", "KeyType": "RANGE"}
              ],
              "Projection": {"ProjectionType": "ALL"}
            },
            {
              "IndexName": "subject-lastModified-index",
              "KeySchema": [
                {"AttributeName": "subject", "KeyType": "HASH"},
                {"AttributeName": "lastModified", "KeyType": "RANGE"}
              ],
              "Projection": {"ProjectionType": "ALL"}
            }]' \
          --billing-mode PAY_PER_REQUEST \
          --no-cli-pager
